<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vahukommide Mäng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }

        .game-area {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: crosshair;
        }

        .marshmallow {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #fff9e6, #ffe6f0);
            border-radius: 0;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
            padding: 0;
            border: 2px solid #ffb3d9;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .ui h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .score {
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .level {
            font-size: 16px;
            color: #764ba2;
            margin-bottom: 5px;
        }

        .time {
            font-size: 16px;
            color: #333;
        }

        .button-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .popup.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .popup h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #333;
        }

        .popup p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #666;
        }

        .popup button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
        }

        .blast {
            position: absolute;
            width: 30px;
            height: 30px;
            animation: blast 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes blast {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .hate-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: red;
            pointer-events: none;
            animation: rotate 1s linear;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .menu {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 10px;
            z-index: 1000;
        }

        .menu a {
            text-decoration: none;
            color: #333;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="menu">
        <a href="index.html">Vahukommide Mäng</a> | <a href="dog_game.html">Koera Põgenemine</a>
    </div>
    <div class="container">
        <div class="game-area" id="gameArea">
            <div class="ui">
                <h1>🎯 Vahukommide Mäng</h1>
                <div class="score">Skoor: <span id="score">0</span></div>
                <div class="level">Tase: <span id="level">1</span></div>
                <div class="lives">Elud: <span id="lives">3</span> ❤️</div>
            </div>
            <div class="button-container">
                <button id="restartBtn">Uuesti Alusta</button>
                <button id="jumpBtn">Hüppa Mäng</button>
            </div>
        </div>
    </div>

    <div class="popup" id="gameOverPopup">
        <h2>Mäng Läbi!</h2>
        <p>Lõplik Skoor: <strong id="finalScore">0</strong></p>
        <p>Tase: <strong id="finalLevel">1</strong></p>
        <button onclick="location.reload()">Uuesti Mängida</button>
    </div>

    <div id="jump-game" style="display: none; text-align: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB;">
        <h2 style="color: white;">Hüppa üle ajavaravate!</h2>
        <canvas id="jump-canvas" width="800" height="400" style="border: 2px solid white; background: #E0F6FF;"></canvas>
        <p style="color: white;">Vajuta tühikut või kliki hüppamiseks! Hüppa üle ajavaravate.</p>
        <button onclick="endJumpGame()" style="margin-top: 10px;">Lõpeta Hüppa Mäng</button>
    </div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const timeDisplay = document.getElementById('time');
        const gameOverPopup = document.getElementById('gameOverPopup');
        const restartBtn = document.getElementById('restartBtn');

        let score = 0;
        let level = 1;
        let gameActive = true;
        let marshmallowCount = 0;
        let lives = 3;
        const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#800080', '#ffc0cb', '#ff4500', '#32cd32', '#1e90ff', '#ffd700', '#da70d6', '#40e0d0'];

        // Hüppa mängu muutujad
        let jumpGameRunning = false;
        let jumpCanvas, jumpCtx;
        let marshmallowY = 300;
        let marshmallowVelocity = 0;
        let jumpsLeft = 1;
        let gates = [];
        let jumpSpeed = 3;
        let jumpScore = 0;
        let jumpLives = 3;
        let jumpInterval;

        // Loo vahukommi
        function createMarshmallow() {
            if (!gameActive) return;

            const marshmallow = document.createElement('div');
            marshmallow.className = 'marshmallow';
            marshmallow.id = 'marshmallow-' + marshmallowCount++;

            const size = 50 + level * 15;
            marshmallow.style.width = size + 'px';
            marshmallow.style.height = size + 'px';

            // Juhuslik värv - roosa
            const color = '#ffc0cb';
            marshmallow.style.background = color;
            marshmallow.style.borderColor = color;

            // Juhuslik positsioon
            const x = Math.random() * (window.innerWidth - size);
            const y = Math.random() * (window.innerHeight - size);

            marshmallow.style.left = x + 'px';
            marshmallow.style.top = y + 'px';

            marshmallow.onclick = (e) => {
                e.stopPropagation();
                hitMarshmallow(marshmallow, x, y, size);
            };

            gameArea.appendChild(marshmallow);

            // Eemaldamine aja möödudes
            setTimeout(() => {
                if (marshmallow.parentElement) {
                    marshmallow.remove();
                }
            }, 2500);
        }

        // Pihtas!
        function hitMarshmallow(marshmallow, x, y, size) {
            score += level * 10;
            scoreDisplay.textContent = score;

            // Vihkamise tekst
            const hateText = document.createElement('div');
            hateText.className = 'hate-text';
            hateText.textContent = 'Ma vihkan vahukomme';
            hateText.style.left = (x + size/2) + 'px';
            hateText.style.top = (y + size/2) + 'px';
            gameArea.appendChild(hateText);

            setTimeout(() => hateText.remove(), 1000);

            marshmallow.remove();

            // Taseme tõstmine
            if (score > 0 && score % 200 === 0) {
                level++;
                levelDisplay.textContent = level;
            }
        }

        // Plahvatuse efekt
        function createBlast(x, y) {
            const blast = document.createElement('div');
            blast.className = 'blast';
            blast.style.left = x + 'px';
            blast.style.top = y + 'px';
            blast.textContent = '💥';
            blast.style.fontSize = '30px';

            gameArea.appendChild(blast);

            setTimeout(() => blast.remove(), 600);
        }

        // Osakesed
        function createParticles(x, y) {
            const particles = ['💧', '✨', '🍧'];

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = particles[Math.floor(Math.random() * particles.length)];
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.fontSize = '20px';

                const angle = (Math.PI * 2 * i) / 8;
                const distance = 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.animation = 'float 0.8s ease-out forwards';

                gameArea.appendChild(particle);

                setTimeout(() => particle.remove(), 800);
            }
        }

        // Mängu lõpp
        function endGame() {
            gameActive = false;
            clearInterval(timeInterval);

            // Eemalda kõik vahukommid
            document.querySelectorAll('.marshmallow').forEach(m => m.remove());

            // Näita popup
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            gameOverPopup.classList.add('show');
        }

        // Alusta uuesti
        restartBtn.onclick = () => {
            location.reload();
        };

        // Hüppa mäng
        jumpBtn.onclick = () => {
            document.querySelector('.container').style.display = 'none';
            document.getElementById('jump-game').style.display = 'block';
            startJumpGame();
        };

        // Hüppa mängu funktsioonid
        function startJumpGame() {
            jumpCanvas = document.getElementById('jump-canvas');
            jumpCtx = jumpCanvas.getContext('2d');
            marshmallowY = 300;
            marshmallowVelocity = 0;
            jumpsLeft = 1;
            gates = [];
            jumpSpeed = 3;
            jumpScore = 0;
            jumpLives = 3;
            jumpGameRunning = true;
            jumpInterval = setInterval(updateJumpGame, 20);
            setTimeout(endJumpGame, 60000); // 1 minut
        }

        function updateJumpGame() {
            if (!jumpGameRunning) return;
            // Puhasta lõuend
            jumpCtx.clearRect(0, 0, jumpCanvas.width, jumpCanvas.height);
            // Joonista maa
            jumpCtx.fillStyle = 'green';
            jumpCtx.fillRect(0, 350, jumpCanvas.width, 50);
            // Joonista vahukomm - roosa
            jumpCtx.fillStyle = '#ffc0cb';
            jumpCtx.fillRect(50, marshmallowY, 40, 40);
            // Gravitatsioon
            marshmallowVelocity += 0.5;
            marshmallowY += marshmallowVelocity;
            if (marshmallowY > 310) {
                marshmallowY = 310;
                marshmallowVelocity = 0;
                jumpsLeft = 1; // Reset jumps on ground
            }
            // Ajavaravad
            for (let i = gates.length - 1; i >= 0; i--) {
                let gate = gates[i];
                gate.x -= jumpSpeed;
                // Joonista värav pruunina
                jumpCtx.strokeStyle = 'brown';
                jumpCtx.lineWidth = 5;
                jumpCtx.beginPath();
                jumpCtx.moveTo(gate.x, gate.y);
                jumpCtx.lineTo(gate.x, gate.y + gate.height);
                jumpCtx.moveTo(gate.x + gate.width, gate.y);
                jumpCtx.lineTo(gate.x + gate.width, gate.y + gate.height);
                jumpCtx.moveTo(gate.x, gate.y + 10);
                jumpCtx.lineTo(gate.x + gate.width, gate.y + 10);
                jumpCtx.stroke();
                if (gate.x < -gate.width) {
                    gates.splice(i, 1);
                    jumpScore++;
                }
                // Kollisjon - lihtsustatud
                if (50 < gate.x + gate.width && 50 + 40 > gate.x && marshmallowY < gate.y + gate.height) {
                    jumpLives--;
                    if (jumpLives <= 0) {
                        endJumpGame();
                    } else {
                        // Reset marshmallow position
                        marshmallowY = 300;
                        marshmallowVelocity = 0;
                        // Remove the gate
                        gates.splice(i, 1);
                    }
                }
            }
            // Lisa varavaid
            if (Math.random() < 0.02) {
                gates.push({x: jumpCanvas.width, y: 310, width: 30, height: 40});
            }
            // Kiirus suureneb
            jumpSpeed += 0.005;
            // Joonista skoor
            jumpCtx.fillStyle = 'black';
            jumpCtx.font = '20px Arial';
            jumpCtx.fillText('Skoor: ' + jumpScore, 10, 30);
            jumpCtx.fillText('Elud: ' + jumpLives, 10, 60);
        }

        function jumpMarshmallow() {
            if (jumpsLeft > 0) {
                marshmallowVelocity = -12;
                jumpsLeft--;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (jumpGameRunning && e.code === 'Space') {
                e.preventDefault();
                jumpMarshmallow();
            }
        });

        jumpCanvas.addEventListener('click', () => {
            if (jumpGameRunning) jumpMarshmallow();
        });

        function endJumpGame() {
            jumpGameRunning = false;
            clearInterval(jumpInterval);
            document.getElementById('jump-game').style.display = 'none';
            document.querySelector('.container').style.display = 'block';
            // Lisa hüppa skoor põhi skoorile
            score += jumpScore * 50;
            scoreDisplay.textContent = score;
        }

        // Alusta mängu
        setInterval(() => {
            if (gameActive) {
                createMarshmallow();
            }
        }, 500 - (level * 40));
    </script>
</body>
</html>
